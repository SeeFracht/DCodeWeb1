<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View and Update User Information</title>
    <link rel="stylesheet" href="../../dynasty33_page/view_personal_information/v_p_i_style.css">
</head>
<body>
<div class="v-u-user-container">
    <h2>View and Update User Information</h2>
    <form id="view-and-update-UserForm">
        <div class="form-group" style="display: none;">
            <label for="userId">UserId:</label>
            <input type="text" id="userId" name="userId">
        </div>
        <div class="form-group">
            <label for="userName">User Name:</label>
            <input type="text" id="userName" name="userName" required>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="idNumber">ID Number:</label>
            <input type="text" id="idNumber" name="idNumber" required>
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">Update User</button>
    </form>
</div>

<!-- 引入Axios -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<!-- JavaScript代码 -->
<script src="../../dynasty33_page/view_personal_information/v_p_i_app.js"></script>
</body>
</html>
