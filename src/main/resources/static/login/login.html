		.modal {

		}

<body>
<div id="particles-js" class="main-form-box">
	<div class="md-form">
		<div class="container">
			<div class="row">
				<div class="col-md-6 offset-md-3">
					<div class="panel panel-login">
						<div class="logo-top">
							<a href="#"><img src="images/logo.png" alt="" /></a>
						</div>
						<div class="panel-heading">
							<div class="row">
								<div class="col-lg-6 col-sm-6 col-xl-6">
									<a href="#" class="active" id="login-form-link">Login</a>
								</div>
								<div class="col-lg-6 col-sm-6 col-xl-6">
									<a href="#" id="register-form-link">Register</a>
								</div>
								<div class="or">OR</div>
							</div>
						</div>
						<div class="panel-body">
							<div class="row">
								<div class="col-lg-12">

									<!--<form id="login-form" action="/user/register" method="post" role="form" style="display: block;">-->
									<form id="login-form" action="/user/login" method="post" role="form">
										<div class="form-group">

											<input type="text" name="username" id="username" tabindex="1" class="form-control" placeholder="Username" value="" required="">
										</div>
										<div class="form-group">
											<label class="icon-lp"><i class="fas fa-key"></i></label>
											<input type="password" name="password" id="password" tabindex="2" class="form-control" placeholder="Password" required="">
										</div>
										<div class="che-box">
											<label class="checkbox-in">
												<input name="checkbox" type="checkbox" tabindex="3" id="remember"> <span></span>
												Remember Me
											</label>
										</div>
										<ul>
											<li>
												<button class="fb"><i class="fab fa-facebook-f"></i> Connect with Facebook</button>
											</li>
											<li>
												<button class="tw"><i class="fab fa-twitter"></i> Connect with X</button>
											</li>
										</ul>
										<div class="form-group">
											<div class="row">
												<div class="col-sm-6 offset-sm-3">
													<input type="submit" name="login-submit" id="login-submit" tabindex="4" class="form-control btn btn-login" value="Log In">
												</div>
											</div>
										</div>
										<div class="form-group">
											<div class="row">
												<div class="col-lg-12">
													<div class="text-center">
														<a href="../temp_page/temp-page.html" tabindex="5" class="forgot-password">Forgot Password?</a>

												</div>
											</div>
										</div>
									</form>

									<!--<form id="register-form" action="/user/register" method="post" role="form" style="display: none;">-->
									<form id="register-form" action="/user/register" method="post" role="form">
										<div class="form-group">
											<label class="icon-lp"><i class="fas fa-user-tie"></i></label>
											<input type="text" name="username" id="user-name" tabindex="1" class="form-control" placeholder="Username" value="" required="">
										</div>
										<div class="form-group">

											<input type="email" name="email" id="email" tabindex="1" class="form-control" placeholder="Email Address" value="" required="">

										<div class="form-group">

											<input type="password" name="password" id="pass-word" tabindex="2" class="form-control" placeholder="Password" required="">

<script src="js/jquery.min.js"></script>
<script src="js/bootstrap.min.js"></script>

<script src="js/index.js"></script>
<script type="text/javascript">
	$(function() {
		// 初始化时显示登录表单，隐藏注册表单，并给登录表单链接添加active类
		$("#login-form").css("display", "block"); // 或者使用 .show() 方法
		$("#register-form").css("display", "none"); // 或者使用 .hide() 方法

		$('#login-form-link').click(function(e) {
			$("#login-form").delay(100).fadeIn(100);
			$("#register-form").fadeOut(100);
			$('#register-form-link').removeClass('active');
			$(this).addClass('active');
			e.preventDefault();
		});
		$('#register-form-link').click(function(e) {
			$("#register-form").delay(100).fadeIn(100);
			$("#login-form").fadeOut(100);
			$('#login-form-link').removeClass('active');
			$(this).addClass('active');
			e.preventDefault();
		});
	});

	$('.form-group input').focus(function () {
		$(this).parent().addClass('addcolor');
	}).blur(function () {
		$(this).parent().removeClass('addcolor');
	});
</script>
<script>
	/* 注册 */
	document.getElementById('register-form').addEventListener('submit', function(event) {
		event.preventDefault(); // 阻止表单默认提交

		var username = document.getElementById('user-name').value;
		var email = document.getElementById('email').value;
		var password = document.getElementById('pass-word').value;
		var confirmPassword = document.getElementById('confirm-password').value;
		var checkbox = document.getElementById('terms-conditions');
		var checkboxMessage = document.getElementById('checkbox-message');

		/* 密码比对 */
		if (password !== confirmPassword) {
			document.getElementById('error-message').textContent = 'Passwords do not match';
			document.getElementById('error-message').style.display = 'block';
			return;
		} else {
			document.getElementById('error-message').style.display = 'none';
		}

		/* 勾选框 */
		if (!checkbox.checked) {
			checkboxMessage.textContent = 'You must agree to the Terms and Conditions and Privacy Policy.';
			checkboxMessage.style.display = 'block';
			return;
		} else {
			checkboxMessage.style.display = 'none';
		}

		var registerRequest = {
			username: username,
			email: email,
			password: password,
			confirmPassword: confirmPassword
		};

		// 使用fetch API向服务器发送POST请求
		fetch('/user/register', {
			method: 'POST', // 设置请求方法为POST
			headers: {
				'Content-Type': 'application/json' // 设置请求头，指定发送的数据类型为JSON
			},
			body: JSON.stringify(registerRequest) // 将registerRequest对象转换为JSON字符串作为请求体
		})
				.then(response => response.json()) // 处理响应，将响应体转换为JSON对象
				.then(data => {
					if (data.message) {
						// 显示模态框
						$('#successModal').modal('show');
						// 设置2秒后关闭模态框并刷新页面
						setTimeout(function () {
							$('#successModal').modal('hide');
							window.location.reload();
						}, 2000);
					}
				})
				.catch(error => console.error('Error:', error)); // 如果请求过程中出现错误，打印错误信息
	});
</script>
<script>
	/* 登录 */
	document.getElementById('login-form').addEventListener('submit', function(event) {
		event.preventDefault(); // 阻止表单默认提交

		var username = document.getElementById('username').value;
		var password = document.getElementById('password').value;

		fetch('/user/login', {
			method: 'POST',
			headers: {
				'Content-Type': 'application/json'
			},
			body: JSON.stringify({
				username: username,
				password: password
			})
		})
				.then(response => response.json())
				.then(data => {
					if (data.message === "Login successful") {
						// 登录成功，跳转到指定页面
						window.location.href = data.redirectUrl;
					} else {
						// 登录失败，显示错误消息
						alert(data.message);
					}
				})
				.catch(error => console.error('Error:', error));
	});
</script>
